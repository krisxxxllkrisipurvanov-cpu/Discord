<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Discord · Community Chat</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0e0e10;
            height: 100vh;
            overflow: hidden;
            color: #eef2ff;
        }

        /* Discord-like loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1e1f22;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
        }

        .loading-content {
            text-align: center;
            animation: fadeInUp 0.5s ease-out;
        }

        .discord-logo-loading {
            font-size: 72px;
            color: #5865f2;
            margin-bottom: 24px;
            animation: pulseGlow 1.8s infinite ease-in-out;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #2b2d31;
            border-top: 4px solid #5865f2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        .loading-text {
            font-size: 16px;
            font-weight: 500;
            color: #dbdee1;
            letter-spacing: 0.5px;
            margin-top: 16px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #b5bac1;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.7; text-shadow: 0 0 0px #5865f2; }
            50% { opacity: 1; text-shadow: 0 0 12px #5865f2; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .loading-overlay.hide {
            opacity: 0;
            visibility: hidden;
        }

        .discord-app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: #1e1f22;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .discord-app.visible {
            opacity: 1;
        }

        .channels-sidebar {
            width: 280px;
            background: #1e1f22;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2b2d31;
        }

        .server-header {
            padding: 16px 20px;
            background: #1e1f22;
            border-bottom: 1px solid #2b2d31;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: #dbdee1;
        }

        .channels-list {
            flex: 1;
            padding: 12px 8px;
            overflow-y: auto;
        }

        .channel-category {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #949ba4;
            padding: 16px 8px 4px 8px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 8px;
            margin: 1px 0;
            border-radius: 8px;
            color: #b5bac1;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .channel-item:hover {
            background: #2e3036;
            color: #dbdee1;
        }

        .channel-item.active {
            background: #2e3036;
            color: #ffffff;
        }

        .user-panel {
            background: #1e1f22;
            border-top: 1px solid #2b2d31;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-panel:hover {
            background: #2b2d31;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: #5865f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            text-transform: uppercase;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: #dbdee1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .change-name-btn {
            font-size: 11px;
            color: #949ba4;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
            cursor: pointer;
        }

        .change-name-btn:hover {
            color: #eef2ff;
            text-decoration: underline;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #313338;
            min-width: 0;
        }

        .chat-header {
            height: 48px;
            background: #2b2d31;
            border-bottom: 1px solid #1e1f22;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-weight: 600;
            font-size: 16px;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-button {
            background: transparent;
            border: none;
            color: #b5bac1;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .close-button:hover {
            background: #e74c3c;
            color: white;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: white;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
        }

        .timestamp {
            font-size: 11px;
            color: #a3a6aa;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            color: #dbdee1;
            margin-top: 2px;
        }

        .message-image {
            margin-top: 8px;
            max-width: 400px;
            max-height: 300px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
        }

        .message-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .chat-input-container {
            background: #2b2d31;
            padding: 8px 16px 16px;
        }

        .input-wrapper {
            background: #383a40;
            border-radius: 36px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border: 1px solid #4e5058;
            gap: 6px;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: #eef2ff;
            font-size: 15px;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #9aa0a8;
        }

        .input-wrapper button {
            background: transparent;
            border: none;
            color: #b5bac1;
            font-size: 22px;
            cursor: pointer;
            padding: 6px 8px;
        }

        .input-wrapper button:hover {
            color: #eef2ff;
        }

        .image-upload-btn {
            font-size: 20px;
            cursor: pointer;
            padding: 6px 4px;
            color: #b5bac1;
        }

        .image-upload-btn:hover {
            color: #eef2ff;
        }

        #fileInput {
            display: none;
        }

        .members-sidebar {
            width: 260px;
            background: #1e1f22;
            border-left: 1px solid #2b2d31;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .members-header {
            padding: 20px 16px 8px;
            font-size: 12px;
            font-weight: 600;
            color: #949ba4;
        }

        .member-list {
            padding: 0 8px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 8px;
            border-radius: 8px;
        }

        .member-avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: white;
        }

        .member-name {
            font-size: 14px;
            font-weight: 500;
            color: #dbdee1;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #23a55a;
            margin-right: 6px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track { background: #1e1f22; }
        ::-webkit-scrollbar-thumb { background: #3b3d44; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="discord-logo-loading"><i class="fa-brands fa-discord"></i></div>
            <div class="loading-spinner"></div>
            <div class="loading-text">Connecting to chat<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div></div>
        </div>
    </div>
    <div class="discord-app" id="discordApp">
        <div class="channels-sidebar">
            <div class="server-header"><i class="fa-brands fa-discord"></i> Discord</div>
            <div class="channels-list" id="channelsList"><div class="channel-category">TEXT CHANNELS</div></div>
            <div class="user-panel" id="userPanel">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="displayUsername">User12312412312</div>
                    <div class="change-name-btn" id="changeNameBtn"><i class="fa-regular fa-pen-to-square"></i> Change name</div>
                </div>
            </div>
        </div>
        <div class="chat-main">
            <div class="chat-header">
                <div class="channel-info"><i class="fa-solid fa-hashtag"></i> <span id="currentChannelName">general</span></div>
                <button class="close-button" id="closeButton"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="chat-messages" id="chatMessagesContainer"></div>
            <div class="chat-input-container">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Message #general" autocomplete="off">
                    <label for="fileInput" class="image-upload-btn"><i class="fa-regular fa-image"></i></label>
                    <input type="file" id="fileInput" accept="image/*">
                    <button id="sendMsgBtn"><i class="fa-regular fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
        <div class="members-sidebar">
            <div class="members-header"><i class="fa-regular fa-user"></i> MEMBERS — 8 online</div>
            <div class="member-list" id="memberList"></div>
            <div class="members-header"><i class="fa-regular fa-circle-check"></i> YOU</div>
            <div class="member-list">
                <div class="member-item">
                    <div class="member-avatar-small" style="background:#5865f2" id="youAvatar">U</div>
                    <div class="member-info"><div class="member-name" id="youMemberName"><span class="status-dot"></span> User12312412312</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- PERSISTENT USERNAME ----------
        const STORAGE_KEY = "discord_chat_username";
        let USER_NAME = localStorage.getItem(STORAGE_KEY) || "User12312412312";
        const USER_AVATAR_COLOR = "#5865f2";

        // ---------- FAKE USERS (regular people) ----------
        const fakeUsers = [
            { id: "u1", name: "AlexMorgan", avatarColor: "#9b59b6" },
            { id: "u2", name: "JadeWinters", avatarColor: "#3498db" },
            { id: "u3", name: "MarcusV", avatarColor: "#e67e22" },
            { id: "u4", name: "SamCortex", avatarColor: "#2ecc71" },
            { id: "u5", name: "LunaRae", avatarColor: "#f1c40f" },
            { id: "u6", name: "DexterK", avatarColor: "#e74c3c" },
            { id: "u7", name: "NinaSky", avatarColor: "#1abc9c" },
            { id: "u8", name: "RileyChen", avatarColor: "#34495e" }
        ];

        // ---------- CHANNELS ----------
        const channels = [
            { id: "ch1", name: "general", icon: "fa-hashtag" },
            { id: "ch2", name: "gaming", icon: "fa-gamepad" },
            { id: "ch3", name: "music", icon: "fa-music" },
            { id: "ch4", name: "tech", icon: "fa-microchip" },
            { id: "ch5", name: "art", icon: "fa-palette" }
        ];

        let messagesByChannel = {};
        let currentChannelId = "ch1";
        let nextMsgId = 0;
        let simulationInterval = null;

        // ---------- SWEAR DETECTION ----------
        const swearWords = ["fuck", "shit", "damn", "bitch", "crap", "ass", "hell", "bastard", "dick", "piss", "cunt", "whore", "slut", "faggot", "retard", "nigger", "asshole", "motherfucker"];
        function containsSwear(text) {
            const lower = text.toLowerCase();
            return swearWords.some(swear => lower.includes(swear));
        }

        // Swear reaction messages (randomly chosen)
        const swearReactions = [
            "WOAH, watch your language! 😳",
            "CLIPED 🎬",
            "WHY ARE YOU SWEARING? 🤨",
            "That's not very nice... 😬",
            "LANGUAGE! Please keep it clean.",
            "Someone's angry 😅",
            "Whoa there, take a breath.",
            "Reported? Just kidding... but chill.",
            "My virtual ears are bleeding 💀",
            "Okay, calm down buddy."
        ];

        // Normal generic messages
        const genericMessages = [
            "Hey everyone! What's up? 👋", "Just finished work, finally some free time.",
            "Has anyone seen the new movie?", "I'm thinking about pizza tonight 🍕",
            "This server is so chill.", "Any game recommendations?",
            "Weekend plans? I'm free!", "The vibes here are immaculate ✨",
            "Just got a new keyboard, it's amazing.", "What's your favorite coffee order?",
            "I'm trying to read more books.", "Anyone else into hiking?"
        ];
        const replyTemplates = [
            "That's a great point, @{user}!", "I totally agree with @{user} 💯",
            "Interesting, @{user}. Tell me more.", "Haha, classic @{user} moment.",
            "Thanks for sharing, @{user}!", "Well said, @{user}. I feel the same.",
            "Wait, @{user} just read my mind.", "Exactly what @{user} said!"
        ];

        const fakeImageUrls = [
            "https://picsum.photos/id/10/400/300", "https://picsum.photos/id/15/400/300",
            "https://picsum.photos/id/26/400/300", "https://picsum.photos/id/29/400/300",
            "https://picsum.photos/id/96/400/300", "https://picsum.photos/id/155/400/300",
            "https://picsum.photos/id/169/400/300", "https://picsum.photos/id/20/400/300"
        ];

        function getRandomImageUrl() { return fakeImageUrls[Math.floor(Math.random() * fakeImageUrls.length)]; }
        function getTimeStamp() { const d = new Date(); return `Today at ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }
        function randomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function addMessage(channelId, userId, userName, content, avatarColor, imageUrl = null) {
            if (!messagesByChannel[channelId]) messagesByChannel[channelId] = [];
            const msg = { id: nextMsgId++, userId, userName, content: content || "", timestamp: getTimeStamp(), avatarColor, imageUrl };
            messagesByChannel[channelId].push(msg);
            if (currentChannelId === channelId) renderMessagesForChannel(channelId);
            return msg;
        }

        function renderMessagesForChannel(channelId) {
            const container = document.getElementById("chatMessagesContainer");
            if (!container) return;
            const msgs = messagesByChannel[channelId] || [];
            container.innerHTML = "";
            msgs.forEach(msg => {
                const row = document.createElement("div"); row.className = "message-row";
                const avatar = document.createElement("div"); avatar.className = "message-avatar"; avatar.style.background = msg.avatarColor;
                avatar.innerText = msg.userName.substring(0,2).toUpperCase();
                const contentDiv = document.createElement("div"); contentDiv.className = "message-content";
                const header = document.createElement("div"); header.className = "message-header";
                const author = document.createElement("span"); author.className = "message-author"; author.innerText = msg.userName;
                const time = document.createElement("span"); time.className = "timestamp"; time.innerText = msg.timestamp;
                header.appendChild(author); header.appendChild(time);
                contentDiv.appendChild(header);
                if (msg.content) { const textDiv = document.createElement("div"); textDiv.className = "message-text"; textDiv.innerText = msg.content; contentDiv.appendChild(textDiv); }
                if (msg.imageUrl) { const imgDiv = document.createElement("div"); imgDiv.className = "message-image"; const img = document.createElement("img"); img.src = msg.imageUrl; imgDiv.appendChild(img); contentDiv.appendChild(imgDiv); }
                row.appendChild(avatar); row.appendChild(contentDiv);
                container.appendChild(row);
            });
            container.scrollTop = container.scrollHeight;
        }

        // Generate fake message text (normal)
        function generateNormalMessage(senderUser, channelId) {
            const channelMsgs = messagesByChannel[channelId] || [];
            if (channelMsgs.length > 0 && Math.random() < 0.45) {
                const recent = [...channelMsgs].reverse().slice(0, 12);
                const eligible = recent.filter(m => m.userId !== senderUser.id && m.userName !== USER_NAME);
                if (eligible.length) {
                    const target = randomItem(eligible);
                    return randomItem(replyTemplates).replace("{user}", target.userName);
                }
            }
            let msg = randomItem(genericMessages);
            if (Math.random() < 0.3) {
                const others = fakeUsers.filter(u => u.id !== senderUser.id);
                if (others.length) msg = `@${randomItem(others).name} ${msg}`;
            }
            return msg;
        }

        function sendFakeMessage() {
            if (!currentChannelId) return;
            const user = randomItem(fakeUsers);
            const text = generateNormalMessage(user, currentChannelId);
            const hasImage = Math.random() < 0.2;
            addMessage(currentChannelId, user.id, user.name, text, user.avatarColor, hasImage ? getRandomImageUrl() : null);
        }

        // REPLY WITH SWEAR DETECTION
        function sendReplyToUser(targetUserName, targetMessageContent, channelId) {
            const randomUser = randomItem(fakeUsers);
            let replyText = "";
            // Check if target message contains swear words
            if (containsSwear(targetMessageContent)) {
                replyText = randomItem(swearReactions);
                // Add a little extra: sometimes mention the user
                if (Math.random() < 0.5) replyText = `@${targetUserName} ${replyText.toLowerCase()}`;
            } else {
                // Normal contextual reply
                const lower = targetMessageContent.toLowerCase();
                if (lower.includes("hello") || lower.includes("hi")) replyText = `Hey @${targetUserName}! 👋`;
                else if (lower.includes("how") && lower.includes("you")) replyText = `Doing great, @${targetUserName}! 😊`;
                else if (lower.includes("weekend")) replyText = `Chilling, @${targetUserName}. You?`;
                else if (lower.includes("game")) replyText = `@${targetUserName} what games do you play?`;
                else if (lower.includes("music")) replyText = `@${targetUserName} any music recommendations? 🎵`;
                else replyText = randomItem(replyTemplates).replace("{user}", targetUserName);
            }
            const hasImage = Math.random() < 0.1;
            addMessage(channelId, randomUser.id, randomUser.name, replyText, randomUser.avatarColor, hasImage ? getRandomImageUrl() : null);
        }

        // User handlers
        function handleUserTextMessage(text) {
            if (!text.trim()) return;
            addMessage(currentChannelId, "current_user", USER_NAME, text, USER_AVATAR_COLOR, null);
            setTimeout(() => sendReplyToUser(USER_NAME, text, currentChannelId), 1200);
        }
        function handleUserImage(file, optionalText = "") {
            const reader = new FileReader();
            reader.onload = (e) => {
                addMessage(currentChannelId, "current_user", USER_NAME, optionalText, USER_AVATAR_COLOR, e.target.result);
                setTimeout(() => sendReplyToUser(USER_NAME, optionalText || "sent an image", currentChannelId), 1500);
            };
            reader.readAsDataURL(file);
        }
        function handleSendButton() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (text) { handleUserTextMessage(text); input.value = ""; }
        }

        // Channel UI
        function initChannels() {
            const container = document.getElementById("channelsList");
            container.innerHTML = `<div class="channel-category">TEXT CHANNELS</div>`;
            channels.forEach(ch => {
                const div = document.createElement("div");
                div.className = `channel-item ${ch.id === currentChannelId ? 'active' : ''}`;
                div.setAttribute("data-channel-id", ch.id);
                div.innerHTML = `<i class="fa-solid ${ch.icon}"></i> <span>${ch.name}</span>`;
                div.addEventListener("click", () => switchChannel(ch.id));
                container.appendChild(div);
            });
        }
        function switchChannel(channelId) {
            if (currentChannelId === channelId) return;
            currentChannelId = channelId;
            document.querySelectorAll(".channel-item").forEach(el => {
                if (el.getAttribute("data-channel-id") === channelId) el.classList.add("active");
                else el.classList.remove("active");
            });
            const ch = channels.find(c => c.id === channelId);
            if (ch) {
                document.getElementById("currentChannelName").innerText = ch.name;
                document.querySelector(".channel-info i").className = `fa-solid ${ch.icon}`;
                document.getElementById("messageInput").placeholder = `Message #${ch.name}`;
            }
            renderMessagesForChannel(channelId);
        }

        function renderMembers() {
            const list = document.getElementById("memberList");
            list.innerHTML = "";
            fakeUsers.forEach(u => {
                const div = document.createElement("div"); div.className = "member-item";
                const avatar = document.createElement("div"); avatar.className = "member-avatar-small"; avatar.style.background = u.avatarColor;
                avatar.innerText = u.name.substring(0,2).toUpperCase();
                const info = document.createElement("div"); info.className = "member-info";
                const nameSpan = document.createElement("div"); nameSpan.className = "member-name";
                nameSpan.innerHTML = `<span class="status-dot"></span> ${u.name}`;
                info.appendChild(nameSpan);
                div.appendChild(avatar); div.appendChild(info);
                list.appendChild(div);
            });
        }

        function updateUserInterface() {
            document.getElementById("displayUsername").innerText = USER_NAME;
            document.getElementById("userAvatar").innerText = USER_NAME.substring(0,2).toUpperCase();
            document.getElementById("youMemberName").innerHTML = `<span class="status-dot"></span> ${USER_NAME}`;
            document.getElementById("youAvatar").innerText = USER_NAME.substring(0,2).toUpperCase();
        }
        function changeUsername() {
            const newName = prompt("Enter new username:", USER_NAME);
            if (newName && newName.trim()) { USER_NAME = newName.trim(); localStorage.setItem(STORAGE_KEY, USER_NAME); updateUserInterface(); }
            else if (newName === "") alert("Username cannot be empty.");
        }

        function seedChannelMessages() {
            channels.forEach(ch => {
                const cid = ch.id;
                if (!messagesByChannel[cid]) messagesByChannel[cid] = [];
                if (messagesByChannel[cid].length === 0) {
                    const num = Math.floor(Math.random() * 4) + 3;
                    for (let i = 0; i < num; i++) {
                        const u = randomItem(fakeUsers);
                        let content = "";
                        if (cid === "ch1") content = randomItem(["Welcome! 🎉", "Happy to be here!"]);
                        else if (cid === "ch2") content = randomItem(["Anyone playing?", "New RPG?"]);
                        else if (cid === "ch3") content = randomItem(["Share playlists!", "Lo-fi vibes"]);
                        else if (cid === "ch4") content = randomItem(["Latest GPU?", "Learning React"]);
                        else content = randomItem(["Art block is real", "Check my sketch!"]);
                        const hasImg = Math.random() < 0.2;
                        addMessage(cid, u.id, u.name, content, u.avatarColor, hasImg ? getRandomImageUrl() : null);
                    }
                    const greet = randomItem(fakeUsers);
                    addMessage(cid, greet.id, greet.name, `Hey everyone! Welcome to #${ch.name} ✨`, greet.avatarColor, null);
                }
            });
        }

        function startSimulation() {
            if (simulationInterval) clearInterval(simulationInterval);
            simulationInterval = setInterval(() => { if (currentChannelId) sendFakeMessage(); }, 6500);
        }

        function setupCloseButton() {
            document.getElementById("closeButton").addEventListener("click", () => {
                window.location.href = "https://krisxxxllkrisipurvanov-cpu.github.io/Windows-Server-2026/";
            });
        }

        function startAppAfterLoading() {
            setTimeout(() => {
                document.getElementById("loadingOverlay").classList.add("hide");
                document.getElementById("discordApp").classList.add("visible");
                setTimeout(() => { document.getElementById("loadingOverlay").style.display = "none"; }, 500);
            }, 1800);
        }

        function init() {
            renderMembers();
            initChannels();
            seedChannelMessages();
            renderMessagesForChannel(currentChannelId);
            startSimulation();
            setupCloseButton();
            updateUserInterface();

            document.getElementById("sendMsgBtn").addEventListener("click", handleSendButton);
            document.getElementById("messageInput").addEventListener("keypress", (e) => { if (e.key === "Enter") handleSendButton(); });
            document.querySelector(".image-upload-btn").addEventListener("click", (e) => { e.preventDefault(); document.getElementById("fileInput").click(); });
            document.getElementById("fileInput").addEventListener("change", (e) => {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    if (file.type.startsWith("image/")) {
                        const text = document.getElementById("messageInput").value.trim();
                        handleUserImage(file, text);
                        document.getElementById("messageInput").value = "";
                    } else alert("Please select an image file");
                    e.target.value = "";
                }
            });
            document.getElementById("changeNameBtn").addEventListener("click", changeUsername);
            document.getElementById("userPanel").addEventListener("click", (e) => {
                if (e.target === document.getElementById("changeNameBtn") || document.getElementById("changeNameBtn").contains(e.target)) return;
                changeUsername();
            });
            startAppAfterLoading();
        }
        init();
    </script>
</body>
</html>
